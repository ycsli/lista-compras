<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lista de Compras do Mo 🛒</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
  transition: 0.3s;
}

.light {
  background: #f1f5f9;
  color: #111;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.progress {
  height: 10px;
  background: #334155;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: 0.4s;
}

.category {
  background: #1e293b;
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
}

.light .category {
  background: #e2e8f0;
}

.item {
  display: flex;
  align-items: center;
  margin: 5px 0;
  cursor: grab;
}

.item span {
  margin-left: 10px;
  flex: 1;
}

.checked {
  text-decoration: line-through;
  opacity: 0.6;
}

button {
  margin-left: 5px;
  cursor: pointer;
}

.add-box {
  display: flex;
  margin-top: 5px;
}

input {
  flex: 1;
}

#celebration {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#000c;
  font-size:40px;
}

.penguin {
  font-size: 90px;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  50% { transform: translateY(-20px); }
}
</style>
</head>

<body>

<div class="container">

<h1>🛒 Lista</h1>

<div class="top-bar">
  <button onclick="toggleTheme()">🌙/☀️</button>
  <button onclick="addCategory()">+ Categoria</button>
</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="list"></div>

<button onclick="finish()">Finalizar Compras</button>

</div>

<div id="celebration">
  <div class="penguin">🐧👍</div>
  <div>Parabéns!</div>
</div>

<audio id="checkSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
let data = JSON.parse(localStorage.getItem("listaPremium")) || {
  "Café da manhã": [
    {name:"Iogurte", done:false},
    {name:"Leite", done:false}
  ],
  "Refeições": [
    {name:"Tomate", done:false},
    {name:"Carne moída", done:false}
  ]
};

let draggedItem = null;

function save(){
  localStorage.setItem("listaPremium", JSON.stringify(data));
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0, done = 0;

  for(let cat in data){
    const div = document.createElement("div");
    div.className = "category";

    const title = document.createElement("h2");
    title.innerText = cat;

    div.appendChild(title);

    data[cat].forEach((item, i)=>{
      total++;
      if(item.done) done++;

      const el = document.createElement("div");
      el.className = "item";
      el.draggable = true;

      el.ondragstart = ()=> draggedItem = {cat, i};

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = item.done;

      const span = document.createElement("span");
      span.innerText = item.name;

      if(item.done) span.classList.add("checked");

      cb.onchange = ()=>{
        item.done = cb.checked;
        document.getElementById("checkSound").play();
        save();
        render();
      };

      const del = document.createElement("button");
      del.innerText = "X";
      del.onclick = ()=>{
        data[cat].splice(i,1);
        save();
        render();
      };

      el.appendChild(cb);
      el.appendChild(span);
      el.appendChild(del);

      div.appendChild(el);
    });

    div.ondragover = e => e.preventDefault();

    div.ondrop = ()=>{
      if(draggedItem){
        const moved = data[draggedItem.cat].splice(draggedItem.i,1)[0];
        data[cat].push(moved);
        save();
        render();
      }
    };

    // adicionar item
    const addBox = document.createElement("div");
    addBox.className = "add-box";

    const input = document.createElement("input");

    const btn = document.createElement("button");
    btn.innerText = "+";

    btn.onclick = ()=>{
      if(input.value){
        data[cat].push({name:input.value, done:false});
        input.value="";
        save();
        render();
      }
    };

    addBox.appendChild(input);
    addBox.appendChild(btn);

    div.appendChild(addBox);

    list.appendChild(div);
  }

  // progresso
  let percent = total ? (done/total)*100 : 0;
  document.getElementById("progressBar").style.width = percent + "%";
}

function addCategory(){
  let name = prompt("Nome da categoria:");
  if(name){
    data[name] = [];
    save();
    render();
  }
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

function finish(){
  document.getElementById("celebration").style.display = "flex";
  confetti();
}

// confete simples
function confetti(){
  for(let i=0;i<100;i++){
    let c = document.createElement("div");
    c.style.position="fixed";
    c.style.width="5px";
    c.style.height="5px";
    c.style.background="white";
    c.style.top="0";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);

    let fall = setInterval(()=>{
      let top = parseInt(c.style.top);
      c.style.top = top + 5 + "px";
      if(top>window.innerHeight){
        clearInterval(fall);
        c.remove();
      }
    },30);
  }
}

render();
</script>

</body>
</html>
