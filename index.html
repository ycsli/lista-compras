<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista</title>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.06);
  --text: #fff;
  --accent: #22c55e;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: var(--text);
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
}

/* progresso */
.progress {
  height: 6px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#22c55e,#4ade80);
  transition: 0.3s;
}

/* cards */
.category {
  background: var(--card);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 15px;
}

.category h2 {
  margin: 0 0 10px;
  font-size: 18px;
}

/* itens */
.item {
  display: flex;
  align-items: center;
  padding: 8px;
  border-radius: 12px;
  transition: 0.2s;
}

.item:hover {
  background: rgba(255,255,255,0.05);
}

.item input {
  appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid #555;
  position: relative;
  cursor: pointer;
}

.item input:checked {
  background: var(--accent);
  border: none;
}

.item input:checked::after {
  content: "✓";
  color: white;
  position: absolute;
  left: 4px;
  top: -1px;
  font-size: 14px;
}

.item span {
  margin-left: 10px;
  flex: 1;
}

.checked {
  text-decoration: line-through;
  opacity: 0.5;
}

/* botões */
button {
  border: none;
  background: #3b82f6;
  color: white;
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 14px;
}

.remove {
  background: #ef4444;
}

.add-box {
  display: flex;
  margin-top: 10px;
  gap: 5px;
}

input[type="text"] {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: none;
}

/* animação final */
#celebration {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#000c;
  font-size:30px;
}

.penguin {
  font-size: 80px;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  50% { transform: translateY(-20px); }
}
</style>
</head>

<body>

<div class="container">
<h1>🛒 Lista</h1>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="list"></div>

<button onclick="finish()">Finalizar compras</button>
</div>

<div id="celebration">
  <div class="penguin">🐧👍</div>
  <div>Parabéns!</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("listaApple")) || {

"Café da manhã":[
{name:"Iogurte",done:false},
{name:"Leite",done:false},
{name:"Leite em pó",done:false},
{name:"Café solúvel",done:false},
{name:"Banana",done:false},
{name:"Maçã verde",done:false}
],

"Refeições":[
{name:"Tomate",done:false},
{name:"Cebola",done:false},
{name:"Batata",done:false},
{name:"Alho",done:false},
{name:"Repolho",done:false},
{name:"Mignon suíno",done:false},
{name:"Carne moída",done:false},
{name:"Hambúrguer",done:false},
{name:"Salsicha",done:false},
{name:"Ovo",done:false},
{name:"Queijo",done:false}
],

"Massas":[
{name:"Cabelinho de anjo",done:false}
],

"Bebidas":[
{name:"Chá de maracujá e morango",done:false}
],

"Extras":[
{name:"Chocolate em pó",done:false},
{name:"Mostarda",done:false},
{name:"Limão",done:false},
{name:"Maracujá",done:false}
]

};

function save(){
  localStorage.setItem("listaApple", JSON.stringify(data));
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  let total=0, done=0;

  for(let cat in data){
    const div = document.createElement("div");
    div.className="category";

    const title=document.createElement("h2");
    title.innerText=cat;
    div.appendChild(title);

    data[cat].forEach((item,i)=>{
      total++;
      if(item.done) done++;

      const el=document.createElement("div");
      el.className="item";

      const cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=item.done;

      const span=document.createElement("span");
      span.innerText=item.name;

      if(item.done) span.classList.add("checked");

      cb.onchange=()=>{
        item.done=cb.checked;
        save();
        render();
      };

      const del=document.createElement("button");
      del.innerText="✕";
      del.className="remove";

      del.onclick=()=>{
        data[cat].splice(i,1);
        save();
        render();
      };

      el.appendChild(cb);
      el.appendChild(span);
      el.appendChild(del);
      div.appendChild(el);
    });

    // adicionar item
    const addBox=document.createElement("div");
    addBox.className="add-box";

    const input=document.createElement("input");
    input.type="text";
    input.placeholder="Novo item...";

    const btn=document.createElement("button");
    btn.innerText="+";

    btn.onclick=()=>{
      if(input.value){
        data[cat].push({name:input.value,done:false});
        input.value="";
        save();
        render();
      }
    };

    addBox.appendChild(input);
    addBox.appendChild(btn);
    div.appendChild(addBox);

    list.appendChild(div);
  }

  let percent = total ? (done/total)*100 : 0;
  document.getElementById("progressBar").style.width = percent+"%";
}

function finish(){
  document.getElementById("celebration").style.display="flex";
}

render();
</script>

</body>
</html>
